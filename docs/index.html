<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>考古題測驗</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Past Exam Trainer</p>
        <h1>考古題測驗網站</h1>
        <p class="hero-copy">
          先選模式，再開始模擬測驗。題目內容與選項保持原樣，並顯示來源序號與單元名稱。
        </p>
      </header>

      <main id="app" class="layout">
        <section class="panel panel-accent" id="setup-panel">
          <h2>開始測驗</h2>
          <div class="mode-grid">
            <button class="mode-card" data-mode="unit10">
              <span class="mode-label">模式一</span>
              <strong>單元隨機 10 題</strong>
              <span>先選單元，再抽 10 題立即作答。</span>
            </button>
            <button class="mode-card" data-mode="mixed50">
              <span class="mode-label">模式二</span>
              <strong>全庫平均抽 50 題</strong>
              <span>跨單元分配題目，結束後看各單元成績。</span>
            </button>
            <button class="mode-card" data-mode="mixed100">
              <span class="mode-label">模式三</span>
              <strong>全庫平均抽 100 題</strong>
              <span>跨單元分配題目，限時 90 分鐘，時間到後顯示超時計時。</span>
            </button>
          </div>

          <div id="unit-picker" class="unit-picker hidden">
            <label for="unit-select">選擇單元</label>
            <select id="unit-select"></select>
            <button id="start-unit-quiz" class="primary-button">開始單元測驗</button>
          </div>

          <div class="data-meta" id="data-meta"></div>
        </section>

        <section class="panel dashboard-panel" id="insights-panel">
          <div class="dashboard-header">
            <div>
              <h2>測驗紀錄與錯題統計</h2>
              <p class="subtle-text">紀錄只保存在目前瀏覽器，模式二與模式三各保留最近 10 次。</p>
            </div>
          </div>

          <div class="history-grid">
            <article class="history-card">
              <div class="history-card-header">
                <h3>模式二紀錄</h3>
                <span id="mixed50-average" class="history-average">平均正確率 0%</span>
              </div>
              <div id="mixed50-history" class="history-list"></div>
            </article>

            <article class="history-card">
              <div class="history-card-header">
                <h3>模式三紀錄</h3>
                <span id="mixed100-average" class="history-average">平均正確率 0%</span>
              </div>
              <div id="mixed100-history" class="history-list"></div>
            </article>
          </div>

          <article class="history-card wrong-stats-card">
            <div class="history-card-header">
              <h3>錯題統計排行</h3>
              <span class="history-average">按單元累積</span>
            </div>
            <div id="wrong-stats-list" class="history-list"></div>
          </article>
        </section>

        <section class="panel hidden" id="quiz-panel">
          <div class="quiz-toolbar">
            <div>
              <p id="progress-text" class="progress-text"></p>
              <p id="quiz-mode-text" class="subtle-text"></p>
            </div>
            <div id="timer-box" class="timer-box hidden">
              <span id="timer-label" class="timer-label">剩餘時間</span>
              <strong id="timer-value" class="timer-value">90:00</strong>
            </div>
            <button id="restart-button" class="secondary-button">重新開始</button>
          </div>

          <article class="question-card">
            <div class="question-header">
              <span id="question-source" class="pill"></span>
              <span id="question-unit" class="pill pill-muted"></span>
            </div>
            <div id="question-stem" class="question-stem"></div>
            <div id="options-list" class="options-list"></div>
            <div id="feedback-box" class="feedback-box hidden"></div>
          </article>

          <div class="quiz-actions">
            <button id="next-button" class="primary-button" disabled>下一題</button>
          </div>
        </section>

        <section class="panel hidden" id="result-panel">
          <div class="result-header">
            <div>
              <h2>測驗結果</h2>
              <p id="result-summary" class="subtle-text"></p>
            </div>
            <button id="restart-result-button" class="secondary-button">重新開始</button>
          </div>

          <div id="result-body" class="result-body"></div>
        </section>
      </main>
    </div>

    <template id="unit-result-template">
      <div class="unit-result-row">
        <span class="unit-result-name"></span>
        <span class="unit-result-score"></span>
      </div>
    </template>

    <template id="history-entry-template">
      <div class="history-entry">
        <div>
          <strong class="history-entry-title"></strong>
          <p class="history-entry-meta"></p>
        </div>
        <span class="history-entry-score"></span>
      </div>
    </template>

    <template id="wrong-stat-template">
      <div class="history-entry">
        <div>
          <strong class="history-entry-title"></strong>
          <p class="history-entry-meta"></p>
        </div>
        <span class="history-entry-score"></span>
      </div>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
